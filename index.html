<script>
  
document.addEventListener("DOMContentLoaded", () => {
  const sections = document.querySelectorAll(".fade-section");

  // Crear cuadritos dentro del overlay
  sections.forEach(section => {
    const overlay = section.querySelector(".pixel-overlay");
    const total = 20 * 20;

    for(let i=0; i<total; i++){
      const block = document.createElement("div");
      overlay.appendChild(block);
    }
  });

  // Animación de cuadritos
  function animateSection(section){
    const blocks = section.querySelectorAll(".pixel-overlay div");
    blocks.forEach((block, index) => {
      setTimeout(() => {
        block.style.opacity = "0";
      }, Math.random() * 1000);
    });
  }

  // IntersectionObserver
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        animateSection(entry.target);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.3 });
  sections.forEach(section => observer.observe(section));
});
  
const links = document.querySelectorAll('a[href^="#"]');
let currentZ = 10;
links.forEach(link => {
  link.addEventListener("click, scroll", e => {
    const id = link.getAttribute("href");

    if (!id.startsWith("#")) return;
    const target = document.querySelector(id);
    if (!target) return;
    currentZ++;
    target.style.zIndex = currentZ;
  });
});

//myWork
const carousel = document.getElementById("carrusel");
const images = Array.from(carousel.getElementsByTagName("img"));
let positions = []; // array que guarda la posición de cada imagen

// Inicializamos las posiciones
function initPositions() {
  const len = images.length;
  positions = [];
  for (let i = 0; i < len; i++) {
    if (i === 0) positions.push("center");
    else if (i % 2 === 1) positions.push("right");
    else positions.push("left");
  }
  updateCarousel();
}

// Función que actualiza estilos según la posición

const maxPairs = 3;   // máximo de capas visibles a cada lado
const baseGap = 2;    // rem de separación horizontal
const scaleStep = 0.1;
let currentIndex = 0;

function updateCarousel() {
  const isMobile = window.innerWidth <= 768;
  const total = images.length;

  images.forEach((img, i) => {
    let offset = i - currentIndex;
    // ciclo infinito
    if (offset < -Math.floor(total / 2)) offset += total;
    if (offset > Math.floor(total / 2)) offset -= total;
    const absOffset = Math.abs(offset);

    let x = 0;
    let scale = 1;
    let rotateY = 0;
    let zIndex = 0;
    let yOffset = 0;

    if (offset === 0) {
      // centro
      scale = 1.1;
      zIndex = 10;
      document.getElementById("carousel-title").textContent =img.dataset.title || "";
    } else {
      const pairIndex = Math.min(absOffset, maxPairs);

      scale = 1 - scaleStep * pairIndex;
      rotateY = offset > 0 ? -15 : 15;
      yOffset = pairIndex * 0.3;
      zIndex = 10 - pairIndex;

      //mobile 
      if (!isMobile) {
        x = (offset > 0 ? 4 : -4) * baseGap * pairIndex;
      }
    }
    img.style.transform = ` translate( calc(-50% + ${x}rem),  calc(-50% + ${yOffset}rem) ) scale(${scale})  rotateY(${rotateY}deg)  `;
    img.style.zIndex = zIndex;
  });
}

// Botones
document.getElementById("next").addEventListener("click", () => {
  currentIndex = (currentIndex + 1) % images.length;
  updateCarousel();
});
document.getElementById("prev").addEventListener("click", () => {
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  updateCarousel();
});

updateCarousel();
// Botones
document.getElementById("next").addEventListener("click", next);
document.getElementById("prev").addEventListener("click", prev);

// Inicializamos
initPositions();

let startX = 0;
let endX = 0;

carousel.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

carousel.addEventListener("touchend", e => {
  endX = e.changedTouches[0].clientX;
  handleSwipe();
});

function handleSwipe() {
  const diff = startX - endX;

  if (Math.abs(diff) < 50) return; // ignora toques pequeños

  if (diff > 0) next();
  else prev();
}



</script>
